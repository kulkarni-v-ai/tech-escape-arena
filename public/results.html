<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Escape Arena – Leaderboard</title>
  <meta name="description" content="Live Leaderboard – All 4 Rounds" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .results-container {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    /* Live Timer in Leaderboard */
    .lb-timer-section {
      margin: 1rem 0 1.5rem;
    }
    .lb-timer {
      font-family: var(--font-heading);
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 900;
      color: var(--neon);
      text-shadow: 0 0 20px var(--neon-glow);
      letter-spacing: 4px;
    }
    .lb-timer.warning { color: #ffaa00; text-shadow: 0 0 20px rgba(255,170,0,0.3); }
    .lb-timer.danger { color: #ff003c; text-shadow: 0 0 20px rgba(255,0,60,0.3); animation: pulse 1s ease infinite; }

    /* Round Tabs */
    .round-tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }

    .round-tab {
      padding: 10px 24px;
      background: rgba(255, 26, 26, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: var(--font-heading);
      font-size: 0.75rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .round-tab::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--neon);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .round-tab:hover {
      background: rgba(255, 26, 26, 0.1);
      color: var(--text-primary);
    }

    .round-tab.active {
      background: rgba(255, 26, 26, 0.15);
      border-color: var(--neon);
      color: var(--neon);
      box-shadow: 0 0 15px rgba(255, 26, 26, 0.15);
    }

    .round-tab.active::before {
      transform: scaleX(1);
    }

    /* Round badge */
    .round-badge {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .round-badge.completed { background: #00ffaa; box-shadow: 0 0 6px rgba(0,255,170,0.5); }
    .round-badge.active-round { background: var(--neon); box-shadow: 0 0 6px var(--neon-glow); animation: pulse 1.5s ease infinite; }
    .round-badge.pending { background: var(--text-dim); }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      text-align: left;
    }
    .results-table th, .results-table td {
      padding: 12px 15px;
      border-bottom: 1px solid rgba(255, 26, 26, 0.2);
      font-family: var(--font-mono);
    }
    .results-table th {
      color: var(--neon-cyan);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.75rem;
    }
    .results-table td {
      color: var(--text-primary);
      font-size: 0.85rem;
    }
    .results-table tbody tr {
      transition: background 0.2s;
    }
    .results-table tbody tr:hover {
      background: rgba(255, 26, 26, 0.04);
    }
    .status-qualified {
      color: #00ffaa;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 255, 170, 0.3);
    }
    .status-eliminated {
      color: var(--neon);
      opacity: 0.6;
    }
    .status-inprogress {
      color: #ffaa00;
    }
    .rank-cell { font-weight: bold; width: 60px; text-align: center; }
    .rank-1 { color: #FFD700; font-size: 1.1rem; }
    .rank-2 { color: #C0C0C0; }
    .rank-3 { color: #CD7F32; }

    .round-summary {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-color);
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <div class="results-container" style="animation: fadeIn 1s ease;">
    <h1 class="dashboard-title">LIVE LEADERBOARD</h1>
    <p class="login-subtitle">// TECH ESCAPE ARENA – ALL ROUNDS</p>

    <!-- Live Timer -->
    <div class="lb-timer-section">
      <p class="timer-label">Time Remaining</p>
      <div class="lb-timer" id="lb-timer">--:--</div>
    </div>

    <!-- Round Tabs -->
    <div class="round-tabs" id="round-tabs">
      <button class="round-tab active" data-round="all">
        <span class="round-badge active-round"></span>OVERALL
      </button>
      <button class="round-tab" data-round="1">
        <span class="round-badge pending"></span>ROUND 1
      </button>
      <button class="round-tab" data-round="2">
        <span class="round-badge pending"></span>ROUND 2
      </button>
      <button class="round-tab" data-round="3">
        <span class="round-badge pending"></span>ROUND 3
      </button>
      <button class="round-tab" data-round="4">
        <span class="round-badge pending"></span>ROUND 4
      </button>
    </div>

    <table class="results-table">
      <thead>
        <tr>
          <th class="rank-cell">Rank</th>
          <th>Team ID</th>
          <th>Team Name</th>
          <th id="th-puzzles">Puzzles Solved</th>
          <th>Total Time</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="results-body">
        <!-- Rendered via JS -->
      </tbody>
    </table>
    
    <div class="round-summary" id="round-summary"></div>

    <div style="margin-top: 2rem;">
      <a href="index.html" class="btn-primary" style="display:inline-block; width:auto; padding: 10px 30px; text-decoration:none;">RETURN TO UPLINK</a>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/results.js"></script>
</body>
</html>
