<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Round 3: Cyber Battle Terminal</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .terminal-container {
      max-width: 800px; margin: 2rem auto; padding: 2rem;
      background: var(--bg-card); border: 2px solid var(--neon-cyan);
      border-radius: 12px; text-align: center; position: relative;
    }
    .buzzer-btn {
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, #ff003c 0%, #990024 100%);
      border: 10px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 30px rgba(255, 0, 60, 0.5);
      color: #fff; font-family: var(--font-heading); font-size: 1.5rem;
      cursor: pointer; transition: all 0.1s ease; margin: 2rem auto;
      display: flex; align-items: center; justify-content: center;
      text-transform: uppercase; letter-spacing: 2px;
    }
    .buzzer-btn:active { transform: scale(0.95); box-shadow: 0 0 10px rgba(255, 0, 60, 0.8); }
    .buzzer-btn:disabled { background: #333; box-shadow: none; cursor: not-allowed; opacity: 0.5; }
    
    .q-display { margin-top: 2rem; padding: 1.5rem; background: rgba(0,0,0,0.4); border-radius: 8px; display: none; }
    .q-text { font-size: 1.2rem; margin-bottom: 1.5rem; color: #fff; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .opt-btn {
      padding: 1rem; background: rgba(0,255,170,0.05); border: 1px solid var(--neon-cyan);
      border-radius: 6px; color: var(--neon-cyan); cursor: pointer; transition: all 0.2s;
    }
    .opt-btn:hover { background: var(--neon-cyan); color: #000; }
    .opt-btn.selected { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
    
    .status-msg { margin-top: 1rem; font-family: var(--font-mono); font-size: 0.9rem; letter-spacing: 1px; }
    .waiting-msg { color: var(--text-dim); animation: blink 2s infinite; }
    
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <div class="terminal-container" style="border:none; background:transparent;">
    <div id="waiting-area" style="text-align:center; margin-top:10vh;">
      <p class="lb-waiting-text" style="font-size:1.5rem; color:var(--neon-cyan); letter-spacing:4px;">WAITING FOR CHALLENGE</p>
      <p style="color:var(--text-dim); margin-top:1rem;">// transmission will appear here</p>
    </div>

    <div id="battle-area" style="display:none;">
      <div class="q-display" id="q-container" style="display:block; background:rgba(0,0,0,0.8); border:1px solid var(--neon-cyan); padding:2rem; border-radius:12px;">
        <p class="q-text" id="q-text" style="font-size:1.5rem; line-height:1.4; margin-bottom:2rem;">Question loading...</p>
        <div class="options-grid" id="options-grid" style="grid-template-columns: 1fr; gap: 1rem;">
          <!-- Options injected here -->
        </div>
      </div>
    </div>
  </div>

  <div id="debug-info" style="position:fixed; bottom:10px; right:10px; font-size:0.6rem; color:rgba(255,255,255,0.2); font-family:var(--font-mono); pointer-events:none;">ID: UNKNOWN | NAME: UNKNOWN</div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" onload="initRound3()"></script>
  <script src="js/storage.js?v=final"></script>
  <script>
    let socket;
    function initRound3() {
      try {
        if (typeof io !== 'undefined') {
          socket = io();
          setupListeners();
        }
      } catch(e) { console.error('Socket init failed:', e); }
    }
    
    const waitingArea = document.getElementById('waiting-area');
    const battleArea = document.getElementById('battle-area');
    const qText = document.getElementById('q-text');
    const optionsGrid = document.getElementById('options-grid');

    function setupListeners() {
      if (!socket) return;
      socket.on('r3:state', (state) => {
        if (!state || !state.bracket) return;
        const match = state.bracket[state.currentMatch];
        const fuzzy = (s) => (s || '').toString().toLowerCase().replace(/[^a-z0-9]/g, '').trim();
        const teamName = Storage.getTeamName();
        const teamId = Storage.getTeamId();
        const isTeamA = match && (fuzzy(match.teamA) === fuzzy(teamName) || fuzzy(match.teamA) === fuzzy(teamId));
        const isTeamB = match && (fuzzy(match.teamB) === fuzzy(teamName) || fuzzy(match.teamB) === fuzzy(teamId));
        const isActive = isTeamA || isTeamB || state.forceBroadcast === true;
        
        if (isActive && state.battleStatus === 'question') {
          waitingArea.style.display = 'none';
          battleArea.style.display = 'block';
          renderQuestion(state.currentQ);
        } else if (isActive && (state.battleStatus === 'revealed' || state.battleStatus === 'finished')) {
          waitingArea.style.display = 'block';
          battleArea.style.display = 'none';
          showStandby('POINT AWARDED / MATCH OVER');
        } else {
          waitingArea.style.display = 'block';
          battleArea.style.display = 'none';
          showStandby(isActive ? 'GET READY: YOU ARE NEXT!' : 'STANDBY: OTHER BATTLE IN PROGRESS');
        }
        document.getElementById('debug-info').textContent = `ID: ${teamId} | NAME: ${teamName}`;
      });
    }

    function showStandby(msg) {
      const el = waitingArea.querySelector('.lb-waiting-text');
      if (el) el.textContent = msg;
    }

    function renderQuestion(q) {
      qText.textContent = q.question;
      optionsGrid.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = String.fromCharCode(65 + i) + '. ' + opt;
        btn.onclick = () => submitAnswer(i);
        optionsGrid.appendChild(btn);
      });
    }

    function submitAnswer(idx) {
      const btns = optionsGrid.querySelectorAll('.opt-btn');
      btns.forEach(b => b.disabled = true);
      btns[idx].classList.add('selected');
      socket.emit('r3:submit', {
        teamId: Storage.getTeamId(),
        answerIdx: idx,
        timestamp: Date.now()
      });
    }
  </script>
</body>
</html>
