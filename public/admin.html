<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Escape Arena – Admin Control</title>
  <meta name="description" content="System Administration" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 3rem auto;
      padding: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 26, 26, 0.2);
      padding-bottom: 1rem;
    }

    .admin-controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-admin {
      padding: 8px 16px;
      background: rgba(255, 26, 26, 0.1);
      border: 1px solid var(--neon);
      border-radius: 4px;
      color: var(--neon);
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-admin:hover {
      background: var(--neon);
      color: #000;
      box-shadow: 0 0 10px var(--neon-glow);
    }
    
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    
    .admin-table th, .admin-table td {
      padding: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-family: var(--font-mono);
      font-size: 0.9rem;
    }

    .admin-table th {
      color: var(--neon-cyan);
    }

    .override-input {
      width: 60px;
      background: #111;
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 4px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <div class="admin-container">
    <div class="admin-header">
      <div>
        <h1 class="dashboard-title">SYSTEM OVERSEER</h1>
        <p class="login-subtitle">// Admin Privileges Active</p>
      </div>
      <div class="admin-controls">
        <button class="btn-admin" id="btn-start-round">Start Round</button>
        <button class="btn-admin" id="btn-toggle-timer">Pause Timer</button>
        <button class="btn-admin" id="btn-toggle-lock">Lock Submissions</button>
        <button class="btn-admin" id="btn-export-csv">Export Results (CSV)</button>
        <a href="results.html" class="btn-admin" style="text-decoration:none;">View Leaderboard</a>
      </div>
    </div>

    <div>
      <h2 style="color: var(--text-primary); font-family: var(--font-heading); margin-bottom: 1rem;">Active Squads</h2>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Team ID</th>
            <th>Name</th>
            <th>Members</th>
            <th>Solved</th>
            <th>Status</th>
            <th>Answers (P1-P2-P3-P4)</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="admin-tbody">
          <!-- Rendered via JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/puzzles.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
