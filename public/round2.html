<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Escape Arena – Round 2: Smart Tech Box</title>
  <meta name="description" content="Round 2 – Submit your final answer to qualify for Round 3." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    .r2-container {
      position: relative; z-index: 1;
      max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2rem;
    }
    .r2-header { text-align: center; }
    .r2-round-badge {
      display: inline-block; padding: 6px 20px; border-radius: 20px;
      background: rgba(255,26,26,0.1); border: 1px solid rgba(255,26,26,0.3);
      font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon);
      letter-spacing: 3px; margin-bottom: 1rem; text-transform: uppercase;
    }
    /* Timer */
    .r2-timer-section { text-align: center; width: 100%; }
    .r2-timer {
      font-family: var(--font-heading); font-weight: 900; letter-spacing: 8px;
      font-size: clamp(3.5rem, 12vw, 7rem); color: var(--neon);
      text-shadow: 0 0 40px var(--neon-glow), 0 0 80px rgba(255,26,26,0.15);
      line-height: 1; transition: color 0.5s, text-shadow 0.5s;
    }
    .r2-timer.warning { color: #ffaa00; text-shadow: 0 0 40px rgba(255,170,0,0.3); }
    .r2-timer.danger { color: #ff003c; text-shadow: 0 0 40px rgba(255,0,60,0.4); animation: pulse 1s ease infinite; }
    .r2-timer.ended { color: #ff003c; animation: glitchText 0.2s ease infinite alternate; }
    .r2-status {
      font-family: var(--font-mono); font-size: 0.8rem;
      color: var(--text-secondary); letter-spacing: 3px; margin-top: 0.5rem;
    }
    .r2-status.active-status { color: #00ffaa; }
    .r2-status.paused-status { color: #ffaa00; }
    .r2-status.ended-status { color: #ff003c; }
    /* Submission Form */
    .r2-form-section {
      width: 100%; max-width: 500px;
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 16px; padding: 2.5rem; backdrop-filter: blur(20px);
      box-shadow: 0 0 50px rgba(0,0,0,0.5); transition: all 0.4s ease;
    }
    .r2-form-section.locked-form {
      opacity: 0.5; pointer-events: none; filter: blur(2px);
    }
    .r2-form-title {
      font-family: var(--font-heading); font-size: 1rem;
      color: var(--neon); letter-spacing: 3px; text-align: center;
      margin-bottom: 0.3rem;
    }
    .r2-form-sub {
      font-family: var(--font-mono); font-size: 0.75rem;
      color: var(--text-dim); text-align: center; margin-bottom: 2rem;
    }
    .r2-input {
      width: 100%; padding: 16px; background: rgba(255,26,26,0.04);
      border: 1px solid var(--border-color); border-radius: 10px;
      color: var(--neon); font-family: var(--font-mono); font-size: 1.1rem;
      letter-spacing: 2px; outline: none; transition: all 0.2s;
      margin-bottom: 1rem;
    }
    .r2-input:focus { border-color: var(--neon); box-shadow: 0 0 20px var(--neon-glow); }
    .r2-input::placeholder { color: var(--text-dim); }
    .r2-submit {
      display: block; width: 100%; padding: 16px; background: transparent;
      border: 2px solid var(--neon); border-radius: 10px; color: var(--neon);
      font-family: var(--font-heading); font-size: 1rem; font-weight: 700;
      letter-spacing: 4px; cursor: pointer; transition: all 0.3s;
      position: relative; overflow: hidden;
    }
    .r2-submit:hover { background: rgba(255,26,26,0.15); box-shadow: 0 0 30px var(--neon-glow); transform: translateY(-2px); }
    .r2-submit:active { transform: translateY(0); }
    .r2-submit:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .r2-error {
      font-family: var(--font-mono); font-size: 0.8rem; color: #ff5555;
      text-align: center; margin-top: 1rem; min-height: 20px;
    }
    /* Success Overlay */
    .r2-success-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 10000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
    }
    .r2-success-overlay.active { opacity: 1; pointer-events: all; }
    .r2-success-icon {
      font-size: 4rem; margin-bottom: 1.5rem;
      animation: fadeInUp 0.6s ease;
    }
    .r2-success-title {
      font-family: var(--font-heading); font-size: clamp(1.5rem,5vw,3rem);
      color: #00ffaa; text-shadow: 0 0 40px rgba(0,255,170,0.4);
      letter-spacing: 6px; animation: fadeInUp 0.6s ease 0.2s both;
    }
    .r2-success-sub {
      font-family: var(--font-mono); font-size: 0.9rem;
      color: var(--text-secondary); margin-top: 1rem;
      animation: fadeInUp 0.6s ease 0.4s both;
    }
    .r2-success-line {
      width: 0; height: 2px; background: #00ffaa;
      margin-top: 1.5rem; box-shadow: 0 0 15px #00ffaa;
      animation: expandLine 0.8s ease 0.6s forwards;
    }
    .r2-success-team {
      font-family: var(--font-heading); font-size: 1rem;
      color: #00ffaa; letter-spacing: 3px; margin-top: 1.5rem;
      animation: fadeInUp 0.6s ease 0.8s both;
    }
    /* Waiting screen */
    .r2-waiting {
      text-align: center; padding: 2rem;
    }
    .r2-waiting-text {
      font-family: var(--font-mono); font-size: 0.9rem;
      color: var(--text-secondary); letter-spacing: 2px;
      animation: pulse 2s ease infinite;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <!-- Success Overlay -->
  <div class="r2-success-overlay" id="success-overlay">
    <div class="r2-success-icon">🔒</div>
    <h1 class="r2-success-title">SUBMISSION LOCKED</h1>
    <p class="r2-success-sub">Your answer has been recorded</p>
    <div class="r2-success-line"></div>
    <p class="r2-success-team" id="success-team"></p>
  </div>

  <div class="r2-container" style="animation: fadeIn 1s ease;">
    <!-- Header -->
    <div class="r2-header">
      <div class="r2-round-badge">ROUND 2 — SMART TECH BOX</div>
      <h1 class="dashboard-title" style="font-size: clamp(1.4rem,4vw,2rem);">TECH ESCAPE ARENA</h1>
    </div>

    <!-- Timer -->
    <div class="r2-timer-section">
      <p class="timer-label">TIME REMAINING</p>
      <div class="r2-timer" id="r2-timer">45:00</div>
      <p class="r2-status" id="r2-status">WAITING FOR HOST</p>
    </div>

    <!-- Submission Form -->
    <div class="r2-form-section" id="form-section">
      <h2 class="r2-form-title">FINAL SUBMISSION</h2>
      <p class="r2-form-sub">// enter your decoded answer below</p>

      <input type="text" class="r2-input" id="team-id-input"
        placeholder="Enter Team ID (e.g. TEA-XXXX)" autocomplete="off" spellcheck="false" />
      <input type="text" class="r2-input" id="answer-input"
        placeholder="Enter final answer..." autocomplete="off" spellcheck="false" />
      <button class="r2-submit" id="btn-submit">SUBMIT ANSWER</button>
      <p class="r2-error" id="error-msg"></p>
    </div>

    <!-- Links -->
    <div style="display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;">
      <a href="leaderboard.html" class="btn-primary" style="display:inline-block; width:auto; padding:10px 24px; text-decoration:none; font-size:0.75rem;">VIEW LEADERBOARD</a>
      <a href="index.html" class="btn-primary" style="display:inline-block; width:auto; padding:10px 24px; text-decoration:none; font-size:0.75rem;">BACK TO LOBBY</a>
    </div>
  </div>

  <script src="js/round2.js"></script>
</body>
</html>
