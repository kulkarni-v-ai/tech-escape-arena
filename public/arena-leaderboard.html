<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Escape Arena – LIVE Arena Leaderboard</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { overflow: hidden; background: #050505; }
    .arena-container {
      position: relative; z-index: 1;
      height: 100vh; display: flex; flex-direction: column;
      padding: 2rem 4rem;
    }
    .arena-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 2rem; border-bottom: 1px solid rgba(255,26,26,0.3);
      padding-bottom: 1rem;
    }
    .arena-title-group h1 {
      font-family: var(--font-heading); font-size: 3.5rem; font-weight: 900;
      color: var(--neon); text-shadow: 0 0 40px var(--neon-glow);
      letter-spacing: 10px; margin: 0;
    }
    .arena-subtitle {
      font-family: var(--font-mono); font-size: 1.2rem; color: var(--text-secondary);
      letter-spacing: 5px; opacity: 0.8;
    }
    .arena-timer {
      font-family: var(--font-heading); font-size: 4rem; font-weight: 900;
      color: var(--neon); text-shadow: 0 0 30px var(--neon-glow);
      letter-spacing: 5px;
    }
    .arena-table-wrap {
      flex: 1; overflow: hidden; position: relative;
      background: rgba(255,26,26,0.02); border: 1px solid rgba(255,26,26,0.1);
      border-radius: 20px; padding: 1rem;
    }
    .arena-table { width: 100%; border-collapse: collapse; }
    .arena-table th {
      text-align: left; padding: 1.5rem; color: var(--neon-cyan);
      font-family: var(--font-mono); font-size: 1rem; letter-spacing: 3px;
      text-transform: uppercase; border-bottom: 1px solid rgba(255,26,26,0.2);
    }
    .arena-table td {
      padding: 1.2rem 1.5rem; font-family: var(--font-mono); font-size: 1.4rem;
      color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .rank-col { width: 100px; text-align: center; font-weight: 900; }
    .rank-1 { color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.4); font-size: 2rem !important; }
    .rank-2 { color: #C0C0C0; font-size: 1.7rem !important; }
    .rank-3 { color: #CD7F32; font-size: 1.6rem !important; }
    
    .status-badge {
      display: inline-block; padding: 4px 15px; border-radius: 6px;
      font-size: 0.9rem; letter-spacing: 1px; font-weight: bold;
    }
    .status-clear { background: rgba(0,255,170,0.15); color: #00ffaa; border: 1px solid #00ffaa; }
    .status-run { background: rgba(255,170,0,0.1); color: #ffaa00; border: 1px solid #ffaa00; }

    @keyframes scroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    .scrolling-content {
      animation: scroll 30s linear infinite;
    }
    .scrolling-content:hover { animation-play-state: paused; }
  </style>
</head>
<body>
  <div class="scanlines"></div><div class="noise"></div>

  <div class="arena-container">
    <div class="arena-header">
      <div class="arena-title-group">
        <h1>ARENA STATUS</h1>
        <div class="arena-subtitle">// GLOBAL LIVE LEADERBOARD</div>
      </div>
      <div class="arena-timer" id="arena-timer">45:00</div>
    </div>

    <div class="arena-table-wrap">
      <table class="arena-table">
        <thead>
          <tr>
            <th class="rank-col">RANK</th>
            <th>TEAM NAME</th>
            <th style="width:200px;">PUZZLES</th>
            <th style="width:200px;">TIME</th>
            <th style="width:250px;">STATUS</th>
          </tr>
        </thead>
        <tbody id="arena-body">
          <!-- Live Data -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script>
    (function() {
      const tbody = document.getElementById('arena-body');
      const timer = document.getElementById('arena-timer');

      async function update() {
        // Sync teams
        try {
           const res = await fetch('/api/teams');
           if (res.ok) {
             const teams = await res.json();
             Storage.saveAllTeams(teams);
             render(Object.values(teams));
           }
        } catch(e) {}

        // Sync Timer
        try {
          const res = await fetch('/api/adminState');
          const st = await res.json();
          if (!st.roundStartedAt) {
            timer.textContent = "WAITING";
          } else if (st.isPaused) {
            timer.textContent = "PAUSED";
          } else {
            const rem = Math.max(0, (45*60*1000) - (Date.now() - st.roundStartedAt));
            const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
            timer.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
          }
        } catch(e) {}
      }

      function render(teams) {
        teams.sort((a,b) => {
          const aS = a.puzzlesSolved || 0, bS = b.puzzlesSolved || 0;
          if (bS !== aS) return bS - aS;
          const tA = a.endTime ? (a.endTime - a.startTime) : Infinity;
          const tB = b.endTime ? (b.endTime - b.startTime) : Infinity;
          return tA - tB;
        });

        tbody.innerHTML = '';
        teams.forEach((t, i) => {
          const rank = i + 1;
          const solved = t.puzzlesSolved || 0;
          const cleared = solved >= 4;
          const time = t.endTime && t.startTime ? fmt(t.endTime-t.startTime) : (t.startTime ? 'RUNNING' : '--:--');
          
          const tr = document.createElement('tr');
          const rCls = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
          
          tr.innerHTML = `
            <td class="rank-col ${rCls}">#${rank}</td>
            <td style="font-weight:bold; letter-spacing:2px;">${(t.teamName || t.name || t.id).toUpperCase()}</td>
            <td>${solved} / 4</td>
            <td>${time}</td>
            <td>
              <span class="status-badge ${cleared?'status-clear':'status-run'}">
                ${cleared ? '✅ ESCAPED' : (solved>0 ? '⏳ IN ARENA' : '🔒 LOCKED')}
              </span>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function fmt(ms) {
        return String(Math.floor(ms/60000)).padStart(2,'0')+':'+String(Math.floor((ms%60000)/1000)).padStart(2,'0');
      }

      update();
      setInterval(update, 2000);
    })();
  </script>
</body>
</html>
