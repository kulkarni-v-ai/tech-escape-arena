<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Escape Arena – Admin Control</title>
  <meta name="description" content="System Administration" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .admin-container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 26, 26, 0.2);
      padding-bottom: 1rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .admin-controls {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .btn-admin {
      padding: 8px 16px;
      background: rgba(255, 26, 26, 0.1);
      border: 1px solid var(--neon);
      border-radius: 4px;
      color: var(--neon);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-admin:hover {
      background: var(--neon);
      color: #000;
      box-shadow: 0 0 10px var(--neon-glow);
    }

    /* Round Status Bar */
    .round-status-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding: 1rem 1.5rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      flex-wrap: wrap;
    }

    .round-indicator {
      font-family: var(--font-heading);
      font-size: 1rem;
      color: var(--neon);
      letter-spacing: 2px;
    }

    .round-timer {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--neon);
      text-shadow: 0 0 15px var(--neon-glow);
      letter-spacing: 3px;
    }

    .round-timer.not-started {
      color: var(--text-dim);
      text-shadow: none;
    }

    .team-count {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-left: auto;
    }
    
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    
    .admin-table th, .admin-table td {
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .admin-table th {
      color: var(--neon-cyan);
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .login-code-cell {
      color: #00ffaa;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .binary-cell {
      color: #00ffaa;
      font-size: 0.65rem;
      opacity: 0.7;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .override-input {
      width: 60px;
      background: #111;
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 4px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .table-scroll {
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <div class="admin-container">
    <div class="admin-header">
      <div>
        <h1 class="dashboard-title">SYSTEM OVERSEER</h1>
        <p class="login-subtitle">// Admin Privileges Active</p>
      </div>
      <div class="admin-controls">
        <button class="btn-admin" id="btn-start-round">Start Round</button>
        <button class="btn-admin" id="btn-restart-timer" style="border-color:#ffaa00; color:#ffaa00;">Restart Timer</button>
        <button class="btn-admin" id="btn-end-round" style="border-color:#ff003c; color:#ff003c;">End Round</button>
        <button class="btn-admin" id="btn-toggle-timer">Pause Timer</button>
        <button class="btn-admin" id="btn-toggle-lock">Lock Submissions</button>
        <button class="btn-admin" id="btn-export-csv">Export CSV</button>
        <a href="/results.html" class="btn-admin" style="text-decoration:none;">Leaderboard</a>
      </div>
      <div class="admin-controls" style="margin-top:0.5rem;">
        <a href="round2" class="btn-admin" style="text-decoration:none;background:rgba(255,26,26,0.2);">R2 Admin</a>
        <a href="/cyberbattle.html" class="btn-admin" style="text-decoration:none;">R3 Battle</a>
        <a href="round4" class="btn-admin" style="text-decoration:none;">R4 Admin</a>
      </div>
    </div>

    <!-- Round Selector -->
    <div class="round-status-bar" style="flex-direction:column; align-items:stretch; gap:1rem;">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.8rem;">
        <div class="round-indicator" id="round-indicator">ROUND 1</div>
        <div class="round-timer not-started" id="admin-timer">NOT STARTED</div>
        <div class="team-count" id="team-count">0 teams registered</div>
      </div>
      <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button class="btn-admin round-select-btn active" data-round="1" style="flex:1; text-align:center;">ROUND 1</button>
        <button class="btn-admin round-select-btn" data-round="2" style="flex:1; text-align:center;">ROUND 2</button>
        <button class="btn-admin round-select-btn" data-round="3" style="flex:1; text-align:center;">ROUND 3</button>
        <button class="btn-admin round-select-btn" data-round="4" style="flex:1; text-align:center;">ROUND 4</button>
      </div>
    </div>

    <div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h2 style="color: var(--text-primary); font-family: var(--font-heading); font-size: 1rem; letter-spacing: 2px;">Active Squads</h2>
        <div style="display:flex; gap:0.5rem;">
          <input type="text" id="new-team-name" placeholder="Team Name..." style="background:rgba(0,0,0,0.5); border:1px solid var(--border-color); color:#fff; padding:5px 10px; font-family:var(--font-mono); font-size:0.8rem; border-radius:4px;" />
          <button class="btn-admin" id="btn-add-team" style="font-size:0.75rem; padding:5px 15px;">Add Team</button>
        </div>
      </div>
      <div class="table-scroll">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Team ID</th>
              <th>Name</th>
              <th>Members</th>
              <th>Login Code</th>
              <th>Solved</th>
              <th>Status</th>
              <th>Answers</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="admin-tbody">
            <!-- Rendered via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/puzzles.js"></script>
  <script src="/js/storage.js"></script>
  <script>
    (function () {
      'use strict';
      // Set admin nav links
      const adminPath = window.location.pathname.replace(/\/dashboard$/, '');
      const r2Nav = document.getElementById('nav-r2-admin'); if(r2Nav) r2Nav.href = adminPath + '/round2';
      const r4Nav = document.getElementById('nav-r4-admin'); if(r4Nav) r4Nav.href = adminPath + '/round4';
      const TOTAL_TIME = 45 * 60 * 1000;
      const tbody = document.getElementById('admin-tbody');
      const btnExport = document.getElementById('btn-export-csv');
      const btnTimer = document.getElementById('btn-toggle-timer');
      const btnLock = document.getElementById('btn-toggle-lock');
      const btnStart = document.getElementById('btn-start-round');
      const btnRestart = document.getElementById('btn-restart-timer');
      const btnEnd = document.getElementById('btn-end-round');
      const roundSelectBtns = document.querySelectorAll('.round-select-btn');
      const roundIndicator = document.getElementById('round-indicator');
      const adminTimer = document.getElementById('admin-timer');
      const teamCount = document.getElementById('team-count');
      
      const token = sessionStorage.getItem('tea_admin_token');
      if (!token) {
        let p = window.location.pathname;
        if (p.endsWith('/dashboard')) p = p.slice(0, -10);
        window.location.href = p;
      }
      
      const ADMIN_STATE_KEY = 'tea_admin_state';
      let cachedState = { isPaused: false, isLocked: false, roundStartedAt: null, currentRound: 1 };

      function getAdminState() { return cachedState; }

      async function syncAdminState() {
        try {
          const res = await fetch('/api/adminState', { headers: { 'Authorization': 'Bearer ' + token } });
          const data = await res.json();
          cachedState = { ...cachedState, ...data };
          localStorage.setItem(ADMIN_STATE_KEY, JSON.stringify(cachedState));
        } catch(e) {
          // Fallback to localStorage
          const val = localStorage.getItem(ADMIN_STATE_KEY);
          if (val) cachedState = { ...cachedState, ...JSON.parse(val) };
        }
      }

      // Convert text to binary
      function textToBinary(text) {
        return text.split('').map(c => c.charCodeAt(0).toString(2).padStart(8, '0')).join(' ');
      }
      
      async function pushAdminState(payload) {
        await fetch('/api/adminState', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(payload)
        });
        // Re-sync from server
        await syncAdminState();
        updateAdminUI();
      }
      
      function updateAdminUI() {
        const st = getAdminState();
        btnTimer.textContent = st.isPaused ? 'Resume Timer' : 'Pause Timer';
        btnTimer.style.background = st.isPaused ? 'var(--neon)' : '';
        btnTimer.style.color = st.isPaused ? '#000' : '';
      
        btnLock.textContent = st.isLocked ? 'Unlock Submissions' : 'Lock Submissions';
        btnLock.style.background = st.isLocked ? 'var(--neon)' : '';
        btnLock.style.color = st.isLocked ? '#000' : '';

        // Round indicator
        const round = st.currentRound || 1;
        roundIndicator.textContent = `ROUND ${round}`;
        
        // Update round selector buttons
        roundSelectBtns.forEach(btn => {
          const r = parseInt(btn.getAttribute('data-round'));
          btn.classList.remove('active');
          btn.style.background = '';
          btn.style.color = '';
          btn.style.borderColor = '';
          if (r === round) {
            btn.classList.add('active');
            btn.style.background = st.roundStartedAt ? 'var(--neon)' : 'rgba(255,26,26,0.2)';
            btn.style.color = st.roundStartedAt ? '#000' : 'var(--neon)';
            btn.style.borderColor = 'var(--neon)';
          } else if (r < round) {
            btn.style.background = 'rgba(0,255,170,0.1)';
            btn.style.color = '#00ffaa';
            btn.style.borderColor = '#00ffaa';
          }
        });

        // Start button state
        if (st.roundStartedAt) {
          btnStart.textContent = 'Round Active';
          btnStart.style.opacity = '0.5';
          btnStart.style.pointerEvents = 'none';
          btnStart.style.background = 'var(--neon)';
          btnStart.style.color = '#000';
          btnEnd.style.opacity = '1';
          btnEnd.style.pointerEvents = 'auto';
        } else {
          btnStart.textContent = 'Start Round ' + round;
          btnStart.style.opacity = '1';
          btnStart.style.pointerEvents = 'auto';
          btnStart.style.background = '';
          btnStart.style.color = '';
          btnEnd.style.opacity = '0.3';
          btnEnd.style.pointerEvents = 'none';
        }
      }

      function updateTimer() {
        const st = getAdminState();
        if (!st.roundStartedAt) {
          adminTimer.textContent = 'NOT STARTED';
          adminTimer.className = 'round-timer not-started';
          return;
        }

        if (st.isPaused) {
          adminTimer.textContent = 'PAUSED';
          adminTimer.className = 'round-timer';
          adminTimer.style.color = '#ffaa00';
          return;
        }

        const elapsed = Date.now() - st.roundStartedAt;
        const remaining = Math.max(0, TOTAL_TIME - elapsed);
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);

        adminTimer.textContent = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        adminTimer.className = 'round-timer';
        adminTimer.style.color = '';

        if (remaining <= 5 * 60 * 1000) {
          adminTimer.style.color = '#ff003c';
        } else if (remaining <= 15 * 60 * 1000) {
          adminTimer.style.color = '#ffaa00';
        }
      }
      
      btnStart.addEventListener('click', () => {
        const round = getAdminState().currentRound || 1;
        if (confirm(`START ROUND ${round}? The 45-minute countdown will begin immediately for all teams.`)) {
          pushAdminState({ startRound: true });
        }
      });

      btnEnd.addEventListener('click', () => {
        const round = getAdminState().currentRound || 1;
        if (confirm(`END ROUND ${round}? This will stop the timer. You can then select the next round.`)) {
          pushAdminState({ resetRound: true });
        }
      });

      btnRestart.addEventListener('click', () => {
        if (confirm("RESTART TIMER? This will reset the 45-minute countdown from 00:00 for all teams. The round number stays the same.")) {
          pushAdminState({ restartRound: true });
        }
      });

      // Round selector — click to switch round (only when no round is active)
      roundSelectBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const st = getAdminState();
          if (st.roundStartedAt) {
            alert('End the current round first before switching.');
            return;
          }
          const newRound = parseInt(btn.getAttribute('data-round'));
          if (confirm(`Switch to ROUND ${newRound}?`)) {
            pushAdminState({ currentRound: newRound });
          }
        });
      });
      
      btnTimer.addEventListener('click', () => pushAdminState({ isPaused: !getAdminState().isPaused }));
      btnLock.addEventListener('click', () => pushAdminState({ isLocked: !getAdminState().isLocked }));
      
      async function pushAllTeams(updatedTeams) {
        await fetch('/api/admin/teams', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ teams: updatedTeams })
        });
      }
      
      function renderTable() {
        const teams = Object.values(Storage.getAllTeams());
        teamCount.textContent = `${teams.length} teams registered`;
        tbody.innerHTML = '';

        // Log binary codes to console only
        console.group('%c🔐 Team Binary Codes', 'color: #00ffaa; font-weight: bold;');
        teams.forEach(t => {
          if (t.loginCode) {
            console.log(`%c${t.id}%c → %c${textToBinary(t.loginCode)}`, 'color: #ff1a1a; font-weight: bold;', 'color: #888;', 'color: #00ffaa;');
          }
        });
        console.groupEnd();

        teams.forEach(t => {
          const tr = document.createElement('tr');
          let status = t.endTime ? 'Completed' : (t.startTime ? 'In Progress' : 'Not Started');
          let statusColor = t.endTime ? '#00ffaa' : (t.startTime ? '#ffaa00' : '#888');
      
          let ansText = 'N/A';
          try {
            const { finalCode } = getPuzzlesForTeam(t.id);
            ansText = finalCode;
          } catch(e){}

          const loginCode = t.loginCode || '—';
      
          tr.innerHTML = `
            <td>${t.id}</td>
            <td class="edit-team-name" data-id="${t.id}" style="cursor:pointer; text-decoration:underline; ${t.eliminated ? 'color: #ff003c; text-decoration: line-through;' : ''}" title="Click to edit name">${t.name || '—'}</td>
            <td style="max-width:150px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${t.members || ''}">${t.members || '—'}</td>
            <td class="login-code-cell">${loginCode}</td>
            <td>
              <input type="number" class="override-input" data-id="${t.id}" value="${t.puzzlesSolved || 0}" min="0" max="4" />
            </td>
            <td style="color:${statusColor};">${t.eliminated ? '<span style="color:#ff003c;font-weight:bold;">ELIMINATED</span>' : status}</td>
            <td><small style="color:var(--neon-cyan); font-size:0.7rem;">${ansText}</small></td>
            <td style="display:flex; gap: 5px;">
              <button class="btn-admin update-btn" data-id="${t.id}" style="font-size:0.7rem; padding:4px 10px;">Update</button>
              <button class="btn-admin eliminate-btn" data-id="${t.id}" style="font-size:0.7rem; padding:4px 10px; border-color:#ffaa00; color:#ffaa00;">
                ${t.eliminated ? 'Restore' : 'Eliminate'}
              </button>
              <button class="btn-admin delete-btn" data-id="${t.id}" style="font-size:0.7rem; padding:4px 10px; border-color:#ff003c; color:#ff003c;">Delete</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      
        // Edit Team Name logic
        document.querySelectorAll('.edit-team-name').forEach(td => {
          td.addEventListener('click', async (e) => {
            const id = e.target.getAttribute('data-id');
            const allTeams = Storage.getAllTeams();
            const t = allTeams[id];
            if (!t) return;
            const newName = prompt(\`Enter new name for Team \${id}:\`, t.name);
            if (newName && newName.trim() !== '' && newName !== t.name) {
              t.name = newName.trim();
              Storage.saveAllTeams(allTeams);
              await pushAllTeams(allTeams);
              renderTable();
            }
          });
        });
      
        document.querySelectorAll('.update-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.target.getAttribute('data-id');
            const input = document.querySelector(`.override-input[data-id="${id}"]`);
            const val = parseInt(input.value);
            
            const allTeams = Storage.getAllTeams();
            if (allTeams[id]) {
              allTeams[id].puzzlesSolved = val;
              Storage.saveAllTeams(allTeams);
              await pushAllTeams(allTeams);
              renderTable();
            }
          });
        });

        document.querySelectorAll('.eliminate-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.target.getAttribute('data-id');
            const allTeams = Storage.getAllTeams();
            if (allTeams[id]) {
              allTeams[id].eliminated = !allTeams[id].eliminated;
              Storage.saveAllTeams(allTeams);
              await pushAllTeams(allTeams);
              renderTable();
            }
          });
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.target.getAttribute('data-id');
            if (confirm(`Are you sure you want to completely DELETE team ${id}? This cannot be undone.`)) {
              try {
                await fetch('/api/admin/delete-team', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                  body: JSON.stringify({ teamId: id })
                });
                await Storage.syncWithServer();
                renderTable();
              } catch(err) {
                alert('Failed to delete team');
              }
            }
          });
        });
      }

      // Add Team Logic
      const btnAddTeam = document.getElementById('btn-add-team');
      const inputNewTeamName = document.getElementById('new-team-name');
      if (btnAddTeam && inputNewTeamName) {
        btnAddTeam.addEventListener('click', async () => {
          const name = inputNewTeamName.value.trim();
          if (!name) return alert('Enter a team name');
          
          btnAddTeam.disabled = true;
          btnAddTeam.textContent = 'Adding...';

          try {
            const res = await fetch('/api/admin/import-teams', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
              body: JSON.stringify({
                teams: [{ teamName: name, members: '' }]
              })
            });
            const data = await res.json();
            if (data.success) {
              inputNewTeamName.value = '';
              // Sync and re-render
              await Storage.syncWithServer();
              renderTable();
            } else {
              alert('Failed to add team: ' + data.error);
            }
          } catch(err) {
            alert('Network error while adding team');
          } finally {
            btnAddTeam.disabled = false;
            btnAddTeam.textContent = 'Add Team';
          }
        });
      }
      
      btnExport.addEventListener('click', () => {
        const teams = Object.values(Storage.getAllTeams());
        let csv = 'Team ID,Name,Members,Login Code,Puzzles Solved,Start Time,End Time,Total Time (ms),Qualified\n';
        teams.forEach(t => {
          csv += `"${t.id}","${t.name}","${t.members}","${t.loginCode || ''}",${t.puzzlesSolved},${t.startTime||''},${t.endTime||''},${(t.endTime&&t.startTime)?(t.endTime-t.startTime):''},${t.isQualified}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'TechEscapeArena_Results.csv';
        a.click(); window.URL.revokeObjectURL(url);
      });
      
      // Initial sync from server, then render
      syncAdminState().then(() => {
        updateAdminUI();
        renderTable();
        updateTimer();
      });

      setInterval(async () => {
        await syncAdminState();
        renderTable();
        updateTimer();
        updateAdminUI();
      }, 3000);
    })();
  </script>
</body>
</html>
